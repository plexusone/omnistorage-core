site_name: OmniStorage Core
site_description: Unified storage abstraction layer for Go (Thin Core)
site_url: https://plexusone.github.io/omnistorage-core
repo_url: https://github.com/plexusone/omnistorage-core
repo_name: plexusone/omnistorage-core

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Concepts: getting-started/concepts.md
  - Backends:
      - Overview: backends/index.md
      - File: backends/file.md
      - Memory: backends/memory.md
      - S3: backends/s3.md
      - SFTP: backends/sftp.md
      - Channel: backends/channel.md
  - Sync Engine:
      - Overview: sync/index.md
      - Operations: sync/operations.md
      - Filtering: sync/filtering.md
      - Transfer Controls: sync/transfer-controls.md
      - rclone Parity: sync/rclone-parity.md
  - Guides:
      - Compression: guides/compression.md
      - Multi-Writer: guides/multi-writer.md
      - Custom Backend: guides/custom-backend.md
  - Reference:
      - Interfaces: reference/interfaces.md
      - Options: reference/options.md
      - Errors: reference/errors.md
  - API Reference: https://pkg.go.dev/github.com/plexusone/omnistorage-core
  - Releases:
      - Changelog: changelog.md
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omnistorage-core
